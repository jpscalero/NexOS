name: Build NexOS ISO

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v2.0
  workflow_dispatch:

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating releases
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Maximize Build Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap curl dos2unix
        
        # Ensure scripts have Linux line endings and are executable
        find . -name "*.sh" -exec dos2unix {} +
        find . -name "*.chroot" -exec dos2unix {} +
        chmod +x build_nexos.sh verify_integrity.sh config/hooks/live/*.chroot

    - name: Verify Integrity
      run: ./verify_integrity.sh

    - name: Build ISO
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo ./build_nexos.sh

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NexOS-ISO
        path: nexos-v1-amd64.iso
        if-no-files-found: error
        retention-days: 7

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: nexos-v1-amd64.iso
        name: NexOS Release ${{ github.ref_name }}
        body: |
          Official Release of NexOS version ${{ github.ref_name }}.
          
          **Changes in this version:**
          - Custom Debian 13 (Trixie) base.
          - KDE Plasma Desktop.
          - Pentesting tools suite included.
          - Server services pre-configured.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
