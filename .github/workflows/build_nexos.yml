name: Compilar ISO NexOS

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Compilar ISO
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    permissions:
      contents: write
    
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Preparar Entorno de Compilación
      run: |
        apt-get update
        apt-get install -y \
          live-build debootstrap curl dos2unix sudo \
          plymouth plymouth-themes \
          isolinux syslinux-common syslinux-efi \
          xorriso coreutils
        
        # Asegurar finales de línea Linux y permisos de ejecución
        find . -name "*.sh" -exec dos2unix {} +
        find . -name "*.chroot" -exec dos2unix {} +
        find . -name "*.conf" -exec dos2unix {} +
        find ./auto -type f -exec dos2unix {} + 2>/dev/null || true
        
        chmod +x build_nexos.sh verify_integrity.sh
        chmod +x auto/config auto/build auto/clean
        chmod +x config/hooks/live/*.chroot

    - name: Verificar Integridad
      run: ./verify_integrity.sh

    - name: Compilar ISO
      run: |
        export DEBIAN_FRONTEND=noninteractive
        ./build_nexos.sh

    - name: Subir Artifact ISO
      uses: actions/upload-artifact@v4
      with:
        name: NexOS-ISO
        path: |
          nexos-v1-amd64.iso
          nexos-v1-amd64.iso.sha256
          nexos-v1-amd64.iso.md5
        if-no-files-found: error
        retention-days: 7

    - name: Crear Release en GitHub
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          nexos-v1-amd64.iso
          nexos-v1-amd64.iso.sha256
          nexos-v1-amd64.iso.md5
        name: NexOS Versión ${{ github.ref_name }}
        body: |
          ## NexOS ${{ github.ref_name }} — Vanguard Edition
          
          Versión oficial de NexOS ${{ github.ref_name }}.
          
          ### Características
          - **Base:** Debian 13 (Trixie)
          - **Escritorio:** KDE Plasma con tema oscuro premium NexOS
          - **Pentesting:** Suite completa (Nmap, Wireshark, Metasploit, Hashcat, etc.)
          - **Instalador:** Instalador gráfico Calamares
          - **Arranque:** Soporte híbrido BIOS + UEFI
          - **Servicios:** SSH, Nginx, MariaDB, UFW pre-configurados
          
          ### Credenciales por defecto
          - **Usuario:** `nexos`
          - **Contraseña:** `nexos`
          
          ### Checksums
          Verifica tu descarga con el archivo `.sha256`.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
