name: Build NexOS ISO

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    permissions:
      contents: write
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        apt-get update
        apt-get install -y \
          live-build debootstrap curl dos2unix sudo \
          plymouth plymouth-themes \
          isolinux syslinux-common syslinux-efi \
          xorriso coreutils
        
        # Ensure scripts have Linux line endings and are executable
        find . -name "*.sh" -exec dos2unix {} +
        find . -name "*.chroot" -exec dos2unix {} +
        find . -name "*.conf" -exec dos2unix {} +
        find ./auto -type f -exec dos2unix {} + 2>/dev/null || true
        
        chmod +x build_nexos.sh verify_integrity.sh
        chmod +x auto/config auto/build auto/clean
        chmod +x config/hooks/live/*.chroot

    - name: Verify Integrity
      run: ./verify_integrity.sh

    - name: Build ISO
      run: |
        export DEBIAN_FRONTEND=noninteractive
        ./build_nexos.sh

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NexOS-ISO
        path: |
          nexos-v1-amd64.iso
          nexos-v1-amd64.iso.sha256
          nexos-v1-amd64.iso.md5
        if-no-files-found: error
        retention-days: 7

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          nexos-v1-amd64.iso
          nexos-v1-amd64.iso.sha256
          nexos-v1-amd64.iso.md5
        name: NexOS Release ${{ github.ref_name }}
        body: |
          ## NexOS ${{ github.ref_name }} — Vanguard Edition
          
          Official Release of NexOS version ${{ github.ref_name }}.
          
          ### Features
          - **Base:** Debian 13 (Trixie)
          - **Desktop:** KDE Plasma with NexOS Premium Dark theme
          - **Pentesting:** Full suite (Nmap, Wireshark, Metasploit, Hashcat, etc.)
          - **Installer:** Calamares graphical installer
          - **Boot:** Hybrid BIOS + UEFI support
          - **Services:** SSH, Nginx, MariaDB, UFW pre-configured
          
          ### Default Credentials
          - **User:** `nexos`
          - **Password:** `nexos`
          
          ### Checksums
          Verify your download with the `.sha256` file.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
