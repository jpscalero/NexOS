# NexOS Live-Config User Configuration
# This file is read by live-config at boot time to configure the live user.
# DO NOT create the user manually in chroot hooks - live-config handles it.

LIVE_USERNAME="nexos"
LIVE_USER_FULLNAME="NexOS User"
LIVE_USER_DEFAULT_GROUPS="audio,cdrom,dip,floppy,video,plugdev,netdev,sudo,wireshark,bluetooth"
