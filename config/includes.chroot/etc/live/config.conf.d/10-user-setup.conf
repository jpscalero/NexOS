# Configuración de Usuario Live-Config NexOS
# Este archivo es leído por live-config en el arranque para configurar el usuario live.
# NO crear el usuario manualmente en hooks de chroot - live-config se encarga de ello.

LIVE_USERNAME="nexos"
LIVE_USER_FULLNAME="Usuario NexOS"
LIVE_USER_DEFAULT_GROUPS="audio,cdrom,dip,floppy,video,plugdev,netdev,sudo,wireshark,bluetooth"
